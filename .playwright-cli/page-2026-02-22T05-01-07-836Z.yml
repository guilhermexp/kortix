        - heading "Resumo Executivo" [level=2] [ref=e423]
        - paragraph [ref=e424]: O Summarize é uma ferramenta open-source que oferece resumos rápidos de links, arquivos e mídias via CLI para automação ou extensão Chrome com Side Panel para uso interativo. Suporta modelos locais, pagos e gratuitos, com pipeline de extração robusta incluindo Firecrawl e Whisper. Ideal para profissionais que precisam de resumos precisos diretamente no terminal ou navegador, otimizando fluxos de trabalho diários.
        - heading "Pontos-Chave" [level=2] [ref=e425]
        - list [ref=e426]:
          - listitem [ref=e427]:
            - strong [ref=e428]: CLI do Summarize
            - text: (
            - link "GitHub" [ref=e429] [cursor=pointer]:
              - /url: https://github.com/steipete/summarize
            - text: "): Ferramenta de linha de comando instalada via"
            - code [ref=e430]: "`npm i -g @steipete/summarize`"
            - text: para gerar resumos de URLs, PDFs, imagens, áudio/vídeo, YouTube e podcasts. Seu diferencial é a automação com saídas em JSON, Markdown ou métricas via flags como
            - code [ref=e431]: "`--json`"
            - text: ou
            - code [ref=e432]: "`--length long`"
            - text: . Uso prático inclui scripts para processar batches de artigos ou relatórios.
          - listitem [ref=e433]:
            - strong [ref=e434]: Extensão Chrome Side Panel
            - text: (
            - link "Chrome Web Store" [ref=e435] [cursor=pointer]:
              - /url: https://chromewebstore.google.com/detail/summarize/cejgnmmhbbpdmjnfppjdfkocebngehfg
            - text: "): Painel lateral que resume a aba ativa em tempo real com daemon local protegido por token. Diferencial é o streaming de Markdown e auto-resumo na navegação, rodando 100% localmente. Prático para resumos one-click durante pesquisas no navegador."
          - listitem [ref=e436]:
            - strong [ref=e437]: Pipeline de extração
            - text: ": Converte HTML em texto limpo usando Readability, markitdown e fallback para"
            - link "Firecrawl" [ref=e438] [cursor=pointer]:
              - /url: https://firecrawl.dev/
            - text: ", lidando com sites anti-scraping. Garante texto de alta qualidade para sumarização precisa. Suporta normalização e conversão para Markdown."
          - listitem [ref=e439]:
            - strong [ref=e440]: Suporte a mídias
            - text: ": Processa podcasts e YouTube priorizando transcrições publicadas, com fallback para"
            - link "Whisper" [ref=e441] [cursor=pointer]:
              - /url: https://openai.com/research/whisper
            - text: em áudio/vídeo. Fluxo transcript-first melhora precisão em conteúdos falados. Ideal para vídeos longos sem perda de contexto.
          - listitem [ref=e442]:
            - strong [ref=e443]: Modelos agnósticos
            - text: ": Integra gateways locais compatíveis com OpenAI, provedores pagos e modelos gratuitos via"
            - link "OpenRouter" [ref=e444] [cursor=pointer]:
              - /url: https://openrouter.ai/
            - text: . Configurável por regras automáticas e chaves API. Permite escolha flexível sem lock-in a um provedor.
          - listitem [ref=e445]:
            - strong [ref=e446]: Saídas versáteis
            - text: ": Streaming em terminal com ANSI Markdown, JSON para scripts e métricas de performance. Comandos como"
            - code [ref=e447]: "`summarize \"https://example.com\" --youtube auto`"
            - text: exemplificam uso scripted. Facilita integração em pipelines DevOps ou análise de dados.
          - listitem [ref=e448]:
            - strong [ref=e449]: Instalação rápida
            - text: ": Basta"
            - code [ref=e450]: "`npm i -g @steipete/summarize`"
            - text: e rodar comandos diretos; extensão requer daemon local. Documentação completa em
            - link "summarize.sh/docs" [ref=e451] [cursor=pointer]:
              - /url: https://summarize.sh/docs/index.html
            - text: . Baixa barreira de entrada para desenvolvedores e usuários técnicos.
